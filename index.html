<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Hoa Ngữ HSK</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#8b1e2d">
</head>
<body class="auth-screen">
  <div class="bg-overlay"></div>
  <div class="sakura-layer" id="sakuraLayer"></div>
  <div class="app-shell">
    <header class="hero">
      <div class="brand-cn">汉语 · HSK</div>
      <h1 class="hero-title">Hoa Ngữ HSK</h1>
      <p class="slogan">Chạm để học. Tiến bộ mỗi ngày.</p>
    </header>
    <main class="container">
      <section id="authView" class="card auth-card">
        <div class="auth-tabs">
          <button class="tab active" data-tab="login">Đăng nhập</button>
          <button class="tab" data-tab="register">Đăng ký</button>
        </div>
        <form id="loginForm" class="auth-form active">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="Email đăng nhập">
          <label>Mật khẩu</label>
          <input id="loginPassword" type="password" placeholder="Mật khẩu">
          <button type="button" class="btn primary" id="loginBtn">Đăng nhập</button>
        </form>
        <form id="registerForm" class="auth-form">
          <label>Email</label>
          <input id="registerEmail" type="email" placeholder="Email đăng ký">
          <label>Mật khẩu</label>
          <input id="registerPassword" type="password" placeholder="Tối thiểu 6 ký tự">
          <button type="button" class="btn gold" id="registerBtn">Đăng ký</button>
        </form>
        <div id="notice" class="notice">Đăng nhập để bắt đầu hành trình chinh phục HSK.</div>
      </section>

      <section id="appView" class="hidden">
        <section class="topbar-clean">
          <div>
            <div class="welcome">Xin chào</div>
            <div id="userName" class="user-name">...</div>
          </div>
          <div class="topbar-actions">
            <button class="btn light" id="adminEntryBtn">Admin</button>
            <button class="btn light" id="logoutBtn">Đăng xuất</button>
          </div>
        </section>

        <section id="homeScreen" class="screen active-screen">
          <section class="panel-white">
            <div class="section-head clean"><h2>Chọn cấp độ HSK</h2></div>
            <div id="levelGrid" class="level-grid"></div>
          </section>
        </section>

        <section id="modeScreen" class="screen">
          <section class="panel-white">
            <button class="btn back-btn light" id="backHomeBtn">← Quay lại</button>
            <h2 id="selectedLevelTitle">HSK1</h2>
            <div class="mode-grid">
              <button class="mode-card" data-module="typing">Luyện gõ</button>
              <button class="mode-card" data-module="flashcards">Flashcard</button>
              <button class="mode-card" data-module="reflection">Phản xạ</button>
              <button class="mode-card" data-module="dialogues">Hội thoại</button>
              <button class="mode-card" data-module="exercises">Bài tập</button>
              <button class="mode-card" data-module="history">Lịch sử</button>
            </div>
          </section>
        </section>

        <section id="studyScreen" class="screen">
          <section class="panel-white">
            <button class="btn back-btn light" id="backModesBtn">← Quay lại</button>
            <h2 id="studyTitle">HSK1</h2>
            <div id="moduleTyping" class="module-view"></div>
            <div id="moduleFlashcards" class="module-view"></div>
            <div id="moduleReflection" class="module-view"></div>
            <div id="moduleDialogues" class="module-view"></div>
            <div id="moduleExercises" class="module-view"></div>
            <div id="moduleHistory" class="module-view"></div>
          </section>
        </section>

        <section id="adminScreen" class="screen">
          <section class="panel-white">
            <div class="section-head clean">
              <div>
                <button class="btn back-btn light" id="backFromAdminBtn">← Quay lại</button>
                <h2>Quản trị tài khoản</h2>
              </div>
              <div class="inline-actions">
                <select id="userFilter" class="select light-select">
                  <option value="all">Tất cả</option>
                  <option value="admin">Admin</option>
                  <option value="user">User</option>
                  <option value="locked">Bị khóa</option>
                  <option value="vip">Có VIP</option>
                </select>
                <button class="btn light" id="reloadUsersBtn">Tải lại</button>
              </div>
            </div>
            <div id="userTableWrap"></div>
          </section>
        </section>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
